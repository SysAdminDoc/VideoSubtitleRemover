name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v3.12.0)'
        required: true
      release_quality:
        description: 'Release quality gate'
        required: true
        default: permissive
        type: choice
        options:
          - permissive
          - strict

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      # Action trust policy: this workflow only uses official GitHub-owned
      # actions by reviewed major-version tags. Any third-party action must be
      # pinned to a full commit SHA and added to tests/test_release_workflow.py.
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          $ErrorActionPreference = 'Stop'

          function Install-Required {
            param(
              [string]$Name,
              [string[]]$PackageArgs
            )
            Write-Host "Installing required dependency group: $Name"
            python -m pip install @PackageArgs
            if ($LASTEXITCODE -ne 0) {
              throw "Required dependency install failed: $Name"
            }
          }

          function Install-Optional {
            param(
              [string]$Name,
              [string[]]$PackageArgs,
              [string]$SkipMessage
            )
            Write-Host "Installing optional dependency group: $Name"
            python -m pip install @PackageArgs
            if ($LASTEXITCODE -ne 0) {
              Write-Host $SkipMessage
              $global:LASTEXITCODE = 0
            }
          }

          Install-Required "pip tooling" @("--upgrade", "pip")
          # torch >= 2.10.0 patches CVE-2026-24747 / CVE-2025-32434.
          Install-Required "torch CPU runtime" @("torch>=2.10.0", "torchvision>=0.25.0", "--index-url", "https://download.pytorch.org/whl/cpu")
          # opencv-python >= 4.12.0 patches CVE-2025-53644 (JPEG read).
          # Pillow >= 12.2.0 patches CVE-2026-25990, GHSA-wjx4-4jcj-g98j,
          # GHSA-pwv6-vv43-88gr, GHSA-whj4-6x5x-4v2j.
          Install-Required "core image stack" @("numpy", "opencv-python>=4.12.0", "Pillow>=12.2.0")
          Install-Required "RapidOCR engines" @("rapidocr>=2.0.0,<4.0.0", "rapidocr-onnxruntime>=1.4.0,<2.0.0")
          Install-Required "LaMa inpainter" @("simple-lama-inpainting")
          Install-Required "EasyOCR fallback" @("easyocr")
          Install-Optional "PaddleOCR" @("paddleocr>=3.0.0,<4.0.0") "PaddleOCR install skipped; release will rely on RapidOCR/EasyOCR."
          Install-Optional "ONNX Runtime DirectML" @("onnxruntime-directml>=1.18.0") "ONNX Runtime DirectML install skipped; release will rely on CUDA/CPU builds."
          Install-Required "PyInstaller" @("pyinstaller")

      - name: OCR dependency version-cap check
        run: |
          python -m backend.dependency_caps

      - name: Dependency vulnerability scan (pip-audit)
        # Reports known CVEs in the installed runtime closure. Runs after
        # the install step so it sees exactly what PyInstaller will bundle.
        # Permissive releases tolerate external advisory-feed drift; strict
        # releases fail on actionable audit results.
        continue-on-error: ${{ github.event.inputs.release_quality != 'strict' }}
        run: |
          python -m pip install pip-audit
          pip-audit --progress-spinner off

      - name: Generate CycloneDX SBOM
        continue-on-error: ${{ github.event.inputs.release_quality != 'strict' }}
        run: |
          python -m pip install cyclonedx-bom
          cyclonedx-py environment --output-format json -o sbom.cdx.json
          if (Test-Path sbom.cdx.json) {
            Write-Host "SBOM generated: $(Get-Item sbom.cdx.json | Select-Object -ExpandProperty Length) bytes"
          } else {
            Write-Host "::warning::SBOM generation produced no output"
          }
        shell: pwsh

      - name: Bundled libpng advisory check (CVE-2026-22801)
        # pip-audit cannot see libpng because it is vendored inside the
        # opencv-python wheel, so we parse cv2.getBuildInformation()
        # directly. The fix is blocked on opencv-python shipping a wheel
        # with libpng >= 1.6.54: while still vulnerable we emit a warning
        # annotation (non-fatal); once a fixed wheel is detected we emit a
        # notice prompting a floor bump. Never fails the build.
        shell: pwsh
        run: |
          $report = python -c @"
          import json
          from backend.security_checks import (
              parse_libpng_version, libpng_is_vulnerable,
              format_libpng_version, LIBPNG_FIXED_VERSION,
          )
          try:
              import cv2
              ver = parse_libpng_version(cv2.getBuildInformation())
          except Exception as exc:
              print(json.dumps({'error': str(exc)})); raise SystemExit(0)
          print(json.dumps({
              'version': format_libpng_version(ver) if ver else None,
              'vulnerable': libpng_is_vulnerable(ver),
              'fixed': format_libpng_version(LIBPNG_FIXED_VERSION),
          }))
          "@
          $data = $report | ConvertFrom-Json
          if ($null -ne $data.error) {
            Write-Host "libpng check skipped: $($data.error)"
          } elseif ($data.vulnerable) {
            Write-Host "::warning title=CVE-2026-22801::OpenCV bundles libpng $($data.version); fixed in $($data.fixed). Avoid untrusted PNG input until opencv-python ships a patched wheel."
          } elseif ($data.version) {
            Write-Host "::notice title=CVE-2026-22801::OpenCV now bundles libpng $($data.version) (>= $($data.fixed)). Bump the opencv-python floor and clear the blocked roadmap item."
          }

      - name: Run regression tests
        run: |
          python -m unittest discover -s tests -v

      - name: Build EXE
        run: |
          $iconArgs = @()
          if (Test-Path "icon.ico") {
            $iconArgs = @("--icon", "icon.ico")
          }

          $dataArgs = @("--add-data", "backend;backend")
          if (Test-Path "assets") { $dataArgs += @("--add-data", "assets;assets") }
          if (Test-Path "banner.png") { $dataArgs += @("--add-data", "banner.png;.") }
          if (Test-Path "icon.png") { $dataArgs += @("--add-data", "icon.png;.") }
          if (Test-Path "favicon.ico") { $dataArgs += @("--add-data", "favicon.ico;.") }
          if (Test-Path "icon.ico") { $dataArgs += @("--add-data", "icon.ico;.") }
          if (Test-Path "icons") { $dataArgs += @("--add-data", "icons;icons") }

          $hiddenImportModules = @(
            "PIL._tkinter_finder",
            "cv2",
            "numpy",
            "tkinter",
            "tkinter.ttk",
            "tkinter.filedialog",
            "tkinter.messagebox",
            "simple_lama_inpainting"
          )
          $hiddenImports = @()
          foreach ($moduleName in $hiddenImportModules) {
            $hiddenImports += @("--hidden-import", $moduleName)
          }

          function Add-HiddenImportIfAvailable([string]$moduleName) {
            python -c "import importlib.util, sys; sys.exit(0 if importlib.util.find_spec('$moduleName') else 1)"
            if ($LASTEXITCODE -eq 0) {
              $script:hiddenImports += @("--hidden-import", $moduleName)
              $script:hiddenImportModules += $moduleName
              Write-Host "Including optional module: $moduleName"
            } else {
              Write-Host "Optional module not installed, skipping: $moduleName"
            }
          }

          Add-HiddenImportIfAvailable "rapidocr"
          Add-HiddenImportIfAvailable "rapidocr_onnxruntime"
          Add-HiddenImportIfAvailable "paddleocr"
          Add-HiddenImportIfAvailable "easyocr"
          Add-HiddenImportIfAvailable "onnxruntime"

          # Collect data files (YAML configs + ONNX models) so RapidOCR
          # can locate default_models.yaml inside the frozen bundle.
          $collectData = @()
          foreach ($pkg in @("rapidocr", "rapidocr_onnxruntime")) {
            python -c "import importlib.util, sys; sys.exit(0 if importlib.util.find_spec('$pkg') else 1)"
            if ($LASTEXITCODE -eq 0) {
              $collectData += @("--collect-data", $pkg)
              Write-Host "Collecting data files for: $pkg"
            }
          }

          python -m PyInstaller --noconfirm --onedir --windowed @iconArgs --name "VideoSubtitleRemoverPro" @dataArgs @hiddenImports @collectData VideoSubtitleRemover.py
          $hiddenImportModules |
            Sort-Object -Unique |
            ConvertTo-Json |
            Set-Content release-hidden-imports.json

          $distDir = "dist\VideoSubtitleRemoverPro"
          foreach ($doc in @("README.md", "LICENSE", "CHANGELOG.md")) {
            if (Test-Path $doc) {
              Copy-Item $doc -Destination (Join-Path $distDir $doc) -Force
            }
          }
          foreach ($launcher in @("Run_VSR_Pro.bat", "Run_VSR_Pro_Debug.bat", "Run_VSR_Pro.ps1")) {
            Copy-Item $launcher -Destination (Join-Path $distDir $launcher) -Force
          }

      - name: Package release ZIP
        run: |
          Compress-Archive -Path dist\VideoSubtitleRemoverPro\* -DestinationPath VideoSubtitleRemoverPro-${{ github.event.inputs.version }}-windows.zip
        shell: pwsh

      # RM-51: NSIS installer build. The `installer/vsr.nsi` script
      # wraps the PyInstaller output into a one-click EXE with Start
      # Menu / Desktop shortcuts, an Uninstall entry, and a "Send to
      # VSR" file-extension verb (RM-58).
      - name: Install NSIS
        shell: pwsh
        run: choco install -y nsis
        continue-on-error: ${{ github.event.inputs.release_quality != 'strict' }}

      - name: Build NSIS installer
        shell: pwsh
        run: |
          if (Test-Path 'C:\Program Files (x86)\NSIS\makensis.exe') {
            & 'C:\Program Files (x86)\NSIS\makensis.exe' installer\vsr.nsi
          } elseif ("${{ github.event.inputs.release_quality }}" -eq "strict") {
            throw "Strict release requires NSIS, but makensis.exe was not found."
          } else {
            Write-Host "NSIS not found; skipping installer build."
          }
          if ("${{ github.event.inputs.release_quality }}" -eq "strict" -and -not (Test-Path 'VideoSubtitleRemoverPro-Setup.exe')) {
            throw "Strict release requires VideoSubtitleRemoverPro-Setup.exe."
          }
        continue-on-error: ${{ github.event.inputs.release_quality != 'strict' }}

      - name: Check signing readiness
        id: signing
        shell: pwsh
        env:
          AZURE_SIGN_TENANT_ID: ${{ secrets.AZURE_SIGN_TENANT_ID }}
        run: |
          $hasSigning = -not [string]::IsNullOrWhiteSpace($env:AZURE_SIGN_TENANT_ID)
          "has_signing=$($hasSigning.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      # RM-50: optional code-signing via Azure Trusted Signing. Activated
      # only when the AZURE_SIGN_TENANT_ID secret is set. Falls through
      # silently for fork builds without the cert provisioned.
      - name: Sign EXE + installer with Azure Trusted Signing
        if: ${{ steps.signing.outputs.has_signing == 'true' }}
        shell: pwsh
        env:
          AZURE_SIGN_TENANT_ID: ${{ secrets.AZURE_SIGN_TENANT_ID }}
          AZURE_SIGN_CLIENT_ID: ${{ secrets.AZURE_SIGN_CLIENT_ID }}
          AZURE_SIGN_CLIENT_SECRET: ${{ secrets.AZURE_SIGN_CLIENT_SECRET }}
          AZURE_SIGN_ENDPOINT: ${{ secrets.AZURE_SIGN_ENDPOINT }}
          AZURE_SIGN_ACCOUNT: ${{ secrets.AZURE_SIGN_ACCOUNT }}
          AZURE_SIGN_PROFILE: ${{ secrets.AZURE_SIGN_PROFILE }}
        run: |
          dotnet tool install --global AzureSignTool
          $exe = 'dist\VideoSubtitleRemoverPro\VideoSubtitleRemoverPro.exe'
          $installer = 'VideoSubtitleRemoverPro-Setup.exe'
          $targets = @($exe)
          if (Test-Path $installer) { $targets += $installer }
          foreach ($t in $targets) {
            azuresigntool sign `
              --azure-key-vault-url $env:AZURE_SIGN_ENDPOINT `
              --azure-key-vault-tenant-id $env:AZURE_SIGN_TENANT_ID `
              --azure-key-vault-client-id $env:AZURE_SIGN_CLIENT_ID `
              --azure-key-vault-client-secret $env:AZURE_SIGN_CLIENT_SECRET `
              --azure-key-vault-certificate $env:AZURE_SIGN_PROFILE `
              --description "Video Subtitle Remover Pro" `
              --description-url "https://github.com/SysAdminDoc/VideoSubtitleRemover" `
              --timestamp-rfc3161 "http://timestamp.acs.microsoft.com" `
              --timestamp-digest sha256 `
              --file-digest sha256 `
              $t
          }
        continue-on-error: ${{ github.event.inputs.release_quality != 'strict' }}

      - name: Verify release artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $versionTag = "${{ github.event.inputs.version }}"
          $quality = "${{ github.event.inputs.release_quality }}"
          $strict = $quality -eq "strict"
          $distDir = "dist\VideoSubtitleRemoverPro"
          $exe = Join-Path $distDir "VideoSubtitleRemoverPro.exe"
          $zip = "VideoSubtitleRemoverPro-$versionTag-windows.zip"
          $installer = "VideoSubtitleRemoverPro-Setup.exe"
          $verification = [ordered]@{
            version = $versionTag
            releaseQuality = $quality
            generatedAtUtc = (Get-Date).ToUniversalTime().ToString("o")
            assets = @()
            bundledDocs = @()
            launchers = @()
            dependencies = @()
            hiddenImports = @()
            adapterSecurity = @()
            remoteModelSecurity = @()
            rapidocrModels = @{}
            releaseTools = @(
              [ordered]@{
                name = "wingetcreate"
                version = "v1.12.8.0"
                asset = "wingetcreate.exe"
                sha256 = "8BD738851B524885410112678E3771B341C5C716DE60FBBECB88AB0A363ED85D"
                source = "https://github.com/microsoft/winget-create/releases/download/v1.12.8.0/wingetcreate.exe"
                verification = "download step enforces SHA-256 and Authenticode before execution"
              }
            )
            versionChecks = @()
            smokeLaunch = [ordered]@{
              attempted = $false
              status = "skipped"
              reason = "Windowed GUI launch is skipped unless a reliable interactive desktop session is available."
            }
          }

          function Add-VerifiedAsset {
            param(
              [string]$Path,
              [string]$Name
            )
            if (-not (Test-Path $Path)) {
              throw "Required release artifact missing: $Path"
            }
            $item = Get-Item $Path
            $hash = Get-FileHash $Path -Algorithm SHA256
            $script:verification.assets += [ordered]@{
              name = $Name
              path = $Path
              bytes = $item.Length
              sha256 = $hash.Hash.ToLowerInvariant()
            }
          }

          Add-VerifiedAsset $zip "windows_zip"
          Add-VerifiedAsset $exe "app_exe"
          if (Test-Path $installer) {
            Add-VerifiedAsset $installer "nsis_installer"
          } elseif ($strict) {
            throw "Strict release requires NSIS installer artifact."
          }

          # RM-106: bundled GUI smoke in strict mode. The frozen app
          # supports --smoke-test, which constructs and tears down the GUI
          # off-screen and exits 0/1 without entering the Tk mainloop. The
          # GitHub-hosted windows-latest runner provides an interactive
          # desktop session, so Tk can create (withdrawn) windows.
          if ($strict) {
            $verification.smokeLaunch.attempted = $true
            try {
              $proc = Start-Process -FilePath $exe -ArgumentList '--smoke-test' -PassThru -NoNewWindow
              if (-not $proc.WaitForExit(120000)) {
                try { $proc.Kill() } catch {}
                throw "Bundled GUI smoke test timed out after 120s."
              }
              $code = $proc.ExitCode
              if ($code -ne 0) {
                throw "Bundled GUI smoke test exited with code $code."
              }
              $verification.smokeLaunch.status = "passed"
              $verification.smokeLaunch.reason = "Frozen app constructed and tore down the GUI off-screen (exit 0)."
            } catch {
              $verification.smokeLaunch.status = "failed"
              $verification.smokeLaunch.reason = $_.Exception.Message
              throw
            }
          }

          foreach ($doc in @("README.md", "LICENSE")) {
            $docPath = Join-Path $distDir $doc
            if (-not (Test-Path $docPath)) {
              throw "Required bundled document missing: $doc"
            }
            $verification.bundledDocs += $doc
          }

          foreach ($launcher in @("Run_VSR_Pro.bat", "Run_VSR_Pro_Debug.bat", "Run_VSR_Pro.ps1")) {
            $launcherPath = Join-Path $distDir $launcher
            if (-not (Test-Path $launcherPath)) {
              throw "Required bundled launcher missing: $launcher"
            }
            $item = Get-Item $launcherPath
            $hash = Get-FileHash $launcherPath -Algorithm SHA256
            $verification.launchers += [ordered]@{
              name = $launcher
              bytes = $item.Length
              sha256 = $hash.Hash.ToLowerInvariant()
            }
          }

          $expectedVersion = $versionTag.TrimStart("v")
          # APP_VERSION is defined in gui/config.py (single source of
          # truth after the RM-114 module split) and re-exported by
          # VideoSubtitleRemover.py and gui/__init__.py.
          $versionSource = "gui/config.py"
          $appSource = Get-Content $versionSource -Raw
          if ($appSource -notmatch 'APP_VERSION\s*=\s*"([^"]+)"') {
            throw "Could not find APP_VERSION in $versionSource"
          }
          $appVersion = $Matches[1]
          $appVersionMatches = $appVersion -eq $expectedVersion
          $verification.versionChecks += [ordered]@{
            path = $versionSource
            expected = $expectedVersion
            actual = $appVersion
            matched = $appVersionMatches
          }
          if (-not $appVersionMatches) {
            throw "APP_VERSION $appVersion does not match release tag $versionTag"
          }

          $docVersionChecks = @(
            @{ Path = "README.md"; Pattern = $expectedVersion },
            @{ Path = "CHANGELOG.md"; Pattern = "## [$expectedVersion]" }
          )
          foreach ($check in $docVersionChecks) {
            $present = Test-Path $check.Path
            $matched = $false
            if ($present) {
              $matched = (Get-Content $check.Path -Raw).Contains($check.Pattern)
            }
            $verification.versionChecks += [ordered]@{
              path = $check.Path
              expected = $check.Pattern
              present = $present
              matched = $matched
            }
            if ($present -and -not $matched) {
              throw "$($check.Path) does not contain expected version marker $($check.Pattern)"
            }
          }

          $dependencyPayload = python -m pip list --format=json | ConvertFrom-Json
          foreach ($dep in ($dependencyPayload | Sort-Object name)) {
            $verification.dependencies += [ordered]@{
              name = $dep.name
              version = $dep.version
            }
          }

          $adapterPayload = python -c "import json; from backend.adapter_manifest import release_manifest_status; print(json.dumps(release_manifest_status()))"
          $verification.adapterSecurity = $adapterPayload | ConvertFrom-Json
          $remoteModelPayload = python -c "import json; from backend.remote_model_policy import release_remote_model_status; print(json.dumps(release_remote_model_status()))"
          $verification.remoteModelSecurity = $remoteModelPayload | ConvertFrom-Json
          $rapidOcrPayload = python -c "import json; from backend.onnx_model_info import rapidocr_release_provenance; print(json.dumps(rapidocr_release_provenance()))"
          $verification.rapidocrModels = $rapidOcrPayload | ConvertFrom-Json
          if ($strict -and ($verification.rapidocrModels.missing -or $verification.rapidocrModels.model_count -eq 0)) {
            throw "Strict release requires readable RapidOCR bundled ONNX models."
          }

          if (-not (Test-Path "release-hidden-imports.json")) {
            throw "Hidden import manifest missing."
          }
          $verification.hiddenImports = Get-Content "release-hidden-imports.json" -Raw | ConvertFrom-Json

          # RM-106: record bundled/system ffmpeg version for CVE triage.
          $ffmpegPath = Get-Command ffmpeg -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
          if ($ffmpegPath) {
            $ffmpegRaw = (& ffmpeg -version 2>&1 | Select-Object -First 1) -replace '^\s+',''
            $ffmpegBuild = ""
            if ($ffmpegRaw -match 'ffmpeg version\s+(\S+)') { $ffmpegBuild = $Matches[1] }
            $ffmpegEncoders = (& ffmpeg -hide_banner -encoders 2>&1) -join "`n"
            $libvvencAvailable = $ffmpegEncoders -match '(^|\s)libvvenc(\s|$)'
            $verification.ffmpeg = [ordered]@{
              path = $ffmpegPath
              version = $ffmpegBuild
              banner = $ffmpegRaw
              libvvenc = [bool]$libvvencAvailable
            }
          } else {
            $verification.ffmpeg = [ordered]@{
              path = ""
              version = ""
              banner = "ffmpeg not found on PATH"
              libvvenc = $false
            }
          }

          if (Test-Path "sbom.cdx.json") {
            $sbomHash = (Get-FileHash "sbom.cdx.json" -Algorithm SHA256).Hash
            $verification.sbom = [ordered]@{
              path = "sbom.cdx.json"
              format = "CycloneDX"
              sha256 = $sbomHash
            }
          } else {
            $verification.sbom = [ordered]@{
              path = ""
              format = "missing"
              sha256 = ""
            }
          }
          if ($strict -and -not (Test-Path "sbom.cdx.json")) {
            throw "Strict release requires an SBOM artifact."
          }

          $signingConfigured = "${{ steps.signing.outputs.has_signing }}" -eq "true"
          if ($signingConfigured) {
            $signedTargets = @($exe)
            if (Test-Path $installer) { $signedTargets += $installer }
            foreach ($target in $signedTargets) {
              $signature = Get-AuthenticodeSignature $target
              if ($signature.Status -ne "Valid") {
                throw "Authenticode signature is not valid for $target: $($signature.Status)"
              }
            }
          }

          $verification | ConvertTo-Json -Depth 5 | Set-Content release-verification.json

      - name: Upload release
        run: |
          $assets = @(
            'VideoSubtitleRemoverPro-${{ github.event.inputs.version }}-windows.zip',
            'release-verification.json'
          )
          if (Test-Path 'sbom.cdx.json') {
            $assets += 'sbom.cdx.json'
          }
          if (Test-Path 'VideoSubtitleRemoverPro-Setup.exe') {
            Rename-Item 'VideoSubtitleRemoverPro-Setup.exe' "VideoSubtitleRemoverPro-${{ github.event.inputs.version }}-Setup.exe"
            $assets += "VideoSubtitleRemoverPro-${{ github.event.inputs.version }}-Setup.exe"
          }
          gh release create ${{ github.event.inputs.version }} `
            $assets `
            --title "VideoSubtitleRemoverPro ${{ github.event.inputs.version }}" `
            --notes "Automated build for ${{ github.event.inputs.version }}" `
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh

      - name: Check winget submission readiness
        id: winget
        shell: pwsh
        env:
          WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_PAT }}
        run: |
          $hasToken = -not [string]::IsNullOrWhiteSpace($env:WINGET_CREATE_GITHUB_TOKEN)
          "has_token=$($hasToken.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Submit winget manifest update
        if: ${{ steps.winget.outputs.has_token == 'true' }}
        shell: pwsh
        env:
          WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_PAT }}
        run: |
          $versionTag = "${{ github.event.inputs.version }}"
          $manifestVersion = $versionTag.TrimStart([char[]]@('v', 'V'))
          $packageId = "SysAdminDoc.VideoSubtitleRemoverPro"
          $installerName = "VideoSubtitleRemoverPro-$versionTag-Setup.exe"
          if (-not (Test-Path $installerName)) {
            Write-Host "NSIS installer was not produced; skipping winget submission."
            exit 0
          }

          $installerUrl = "https://github.com/SysAdminDoc/VideoSubtitleRemover/releases/download/$versionTag/$installerName"
          $wingetCreateVersion = "v1.12.8.0"
          $wingetCreateSha256 = "8BD738851B524885410112678E3771B341C5C716DE60FBBECB88AB0A363ED85D"
          $wingetCreateUrl = "https://github.com/microsoft/winget-create/releases/download/$wingetCreateVersion/wingetcreate.exe"
          Invoke-WebRequest -Uri $wingetCreateUrl -OutFile wingetcreate.exe
          $wingetHash = (Get-FileHash .\wingetcreate.exe -Algorithm SHA256).Hash.ToUpperInvariant()
          if ($wingetHash -ne $wingetCreateSha256) {
            throw "wingetcreate.exe hash mismatch: expected $wingetCreateSha256, got $wingetHash"
          }
          $wingetSignature = Get-AuthenticodeSignature .\wingetcreate.exe
          if ($wingetSignature.Status -ne "Valid") {
            throw "wingetcreate.exe Authenticode signature is not valid: $($wingetSignature.Status)"
          }
          if ($wingetSignature.SignerCertificate.Subject -notmatch "Microsoft") {
            throw "wingetcreate.exe signer is not Microsoft: $($wingetSignature.SignerCertificate.Subject)"
          }
          Write-Host "wingetcreate $wingetCreateVersion verified ($wingetHash)"
          .\wingetcreate.exe update $packageId `
            --urls "$installerUrl|x64|machine" `
            --version $manifestVersion `
            --release-notes-url "https://github.com/SysAdminDoc/VideoSubtitleRemover/releases/tag/$versionTag" `
            --submit `
            --token $env:WINGET_CREATE_GITHUB_TOKEN `
            --no-open
