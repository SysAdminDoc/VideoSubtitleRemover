name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v3.12.0)'
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # torch >= 2.10.0 patches CVE-2026-24747 / CVE-2025-32434.
          python -m pip install "torch>=2.10.0" "torchvision>=0.25.0" --index-url https://download.pytorch.org/whl/cpu
          # opencv-python >= 4.12.0 patches CVE-2025-53644 (JPEG read).
          # Pillow >= 11.3.0 patches CVE-2026-25990 (PSD loader OOB write).
          python -m pip install numpy "opencv-python>=4.12.0" "Pillow>=11.3.0"
          python -m pip install rapidocr rapidocr-onnxruntime
          python -m pip install simple-lama-inpainting
          python -m pip install easyocr
          try {
            python -m pip install "paddleocr>=3.0.0"
          } catch {
            Write-Host "PaddleOCR install skipped; release will rely on RapidOCR/EasyOCR."
          }
          try {
            python -m pip install "torch-directml==0.2.5.dev240914"
          } catch {
            Write-Host "torch-directml install skipped; release will rely on CUDA/CPU builds."
          }
          python -m pip install pyinstaller

      - name: Dependency vulnerability scan (pip-audit)
        # Reports known CVEs in the installed runtime closure. Runs after
        # the install step so it sees exactly what PyInstaller will bundle.
        # Non-fatal during the transitional v3.13 cycle: pip-audit's vuln
        # database can lag patched wheels by hours, and we don't want a
        # flaky external feed to brick a release. Flip continue-on-error
        # to false once the pin set in requirements.txt is stable.
        continue-on-error: true
        run: |
          python -m pip install pip-audit
          pip-audit --progress-spinner off

      - name: Run regression tests
        run: |
          python -m unittest discover -s tests -v

      - name: Build EXE
        run: |
          $iconArgs = @()
          if (Test-Path "icon.ico") {
            $iconArgs = @("--icon", "icon.ico")
          }

          $dataArgs = @("--add-data", "backend;backend")
          if (Test-Path "assets") { $dataArgs += @("--add-data", "assets;assets") }
          if (Test-Path "banner.png") { $dataArgs += @("--add-data", "banner.png;.") }
          if (Test-Path "icon.png") { $dataArgs += @("--add-data", "icon.png;.") }
          if (Test-Path "favicon.ico") { $dataArgs += @("--add-data", "favicon.ico;.") }
          if (Test-Path "icon.ico") { $dataArgs += @("--add-data", "icon.ico;.") }
          if (Test-Path "icons") { $dataArgs += @("--add-data", "icons;icons") }

          $hiddenImports = @(
            "--hidden-import", "PIL._tkinter_finder",
            "--hidden-import", "cv2",
            "--hidden-import", "numpy",
            "--hidden-import", "tkinter",
            "--hidden-import", "tkinter.ttk",
            "--hidden-import", "tkinter.filedialog",
            "--hidden-import", "tkinter.messagebox",
            "--hidden-import", "simple_lama_inpainting"
          )

          function Add-HiddenImportIfAvailable([string]$moduleName) {
            python -c "import importlib.util, sys; sys.exit(0 if importlib.util.find_spec('$moduleName') else 1)"
            if ($LASTEXITCODE -eq 0) {
              $script:hiddenImports += @("--hidden-import", $moduleName)
              Write-Host "Including optional module: $moduleName"
            } else {
              Write-Host "Optional module not installed, skipping: $moduleName"
            }
          }

          Add-HiddenImportIfAvailable "rapidocr"
          Add-HiddenImportIfAvailable "rapidocr_onnxruntime"
          Add-HiddenImportIfAvailable "paddleocr"
          Add-HiddenImportIfAvailable "easyocr"
          Add-HiddenImportIfAvailable "torch_directml"

          python -m PyInstaller --noconfirm --onedir --windowed @iconArgs --name "VideoSubtitleRemoverPro" @dataArgs @hiddenImports VideoSubtitleRemover.py

          $distDir = "dist\VideoSubtitleRemoverPro"
          foreach ($doc in @("README.md", "LICENSE", "CHANGELOG.md")) {
            if (Test-Path $doc) {
              Copy-Item $doc -Destination (Join-Path $distDir $doc) -Force
            }
          }

      - name: Package release
        run: |
          Compress-Archive -Path dist\VideoSubtitleRemoverPro\* -DestinationPath VideoSubtitleRemoverPro-${{ github.event.inputs.version }}-windows.zip
        shell: pwsh

      - name: Upload release
        run: |
          gh release create ${{ github.event.inputs.version }} VideoSubtitleRemoverPro-${{ github.event.inputs.version }}-windows.zip --title "VideoSubtitleRemoverPro ${{ github.event.inputs.version }}" --notes "Automated build for ${{ github.event.inputs.version }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
