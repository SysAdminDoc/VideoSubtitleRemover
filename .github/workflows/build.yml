name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v3.12.0)'
        required: true
      release_quality:
        description: 'Release quality gate'
        required: true
        default: permissive
        type: choice
        options:
          - permissive
          - strict

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          $ErrorActionPreference = 'Stop'

          function Install-Required {
            param(
              [string]$Name,
              [string[]]$PackageArgs
            )
            Write-Host "Installing required dependency group: $Name"
            python -m pip install @PackageArgs
            if ($LASTEXITCODE -ne 0) {
              throw "Required dependency install failed: $Name"
            }
          }

          function Install-Optional {
            param(
              [string]$Name,
              [string[]]$PackageArgs,
              [string]$SkipMessage
            )
            Write-Host "Installing optional dependency group: $Name"
            python -m pip install @PackageArgs
            if ($LASTEXITCODE -ne 0) {
              Write-Host $SkipMessage
              $global:LASTEXITCODE = 0
            }
          }

          Install-Required "pip tooling" @("--upgrade", "pip")
          # torch >= 2.10.0 patches CVE-2026-24747 / CVE-2025-32434.
          Install-Required "torch CPU runtime" @("torch>=2.10.0", "torchvision>=0.25.0", "--index-url", "https://download.pytorch.org/whl/cpu")
          # opencv-python >= 4.12.0 patches CVE-2025-53644 (JPEG read).
          # Pillow >= 12.1.1 patches CVE-2026-25990 (PSD loader OOB write).
          Install-Required "core image stack" @("numpy", "opencv-python>=4.12.0", "Pillow>=12.1.1")
          Install-Required "RapidOCR engines" @("rapidocr", "rapidocr-onnxruntime")
          Install-Required "LaMa inpainter" @("simple-lama-inpainting")
          Install-Required "EasyOCR fallback" @("easyocr")
          Install-Optional "PaddleOCR" @("paddleocr>=3.0.0") "PaddleOCR install skipped; release will rely on RapidOCR/EasyOCR."
          Install-Optional "ONNX Runtime DirectML" @("onnxruntime-directml>=1.18.0") "ONNX Runtime DirectML install skipped; release will rely on CUDA/CPU builds."
          Install-Required "PyInstaller" @("pyinstaller")

      - name: Dependency vulnerability scan (pip-audit)
        # Reports known CVEs in the installed runtime closure. Runs after
        # the install step so it sees exactly what PyInstaller will bundle.
        # Permissive releases tolerate external advisory-feed drift; strict
        # releases fail on actionable audit results.
        continue-on-error: ${{ github.event.inputs.release_quality != 'strict' }}
        run: |
          python -m pip install pip-audit
          pip-audit --progress-spinner off

      - name: Run regression tests
        run: |
          python -m unittest discover -s tests -v

      - name: Build EXE
        run: |
          $iconArgs = @()
          if (Test-Path "icon.ico") {
            $iconArgs = @("--icon", "icon.ico")
          }

          $dataArgs = @("--add-data", "backend;backend")
          if (Test-Path "assets") { $dataArgs += @("--add-data", "assets;assets") }
          if (Test-Path "banner.png") { $dataArgs += @("--add-data", "banner.png;.") }
          if (Test-Path "icon.png") { $dataArgs += @("--add-data", "icon.png;.") }
          if (Test-Path "favicon.ico") { $dataArgs += @("--add-data", "favicon.ico;.") }
          if (Test-Path "icon.ico") { $dataArgs += @("--add-data", "icon.ico;.") }
          if (Test-Path "icons") { $dataArgs += @("--add-data", "icons;icons") }

          $hiddenImportModules = @(
            "PIL._tkinter_finder",
            "cv2",
            "numpy",
            "tkinter",
            "tkinter.ttk",
            "tkinter.filedialog",
            "tkinter.messagebox",
            "simple_lama_inpainting"
          )
          $hiddenImports = @()
          foreach ($moduleName in $hiddenImportModules) {
            $hiddenImports += @("--hidden-import", $moduleName)
          }

          function Add-HiddenImportIfAvailable([string]$moduleName) {
            python -c "import importlib.util, sys; sys.exit(0 if importlib.util.find_spec('$moduleName') else 1)"
            if ($LASTEXITCODE -eq 0) {
              $script:hiddenImports += @("--hidden-import", $moduleName)
              $script:hiddenImportModules += $moduleName
              Write-Host "Including optional module: $moduleName"
            } else {
              Write-Host "Optional module not installed, skipping: $moduleName"
            }
          }

          Add-HiddenImportIfAvailable "rapidocr"
          Add-HiddenImportIfAvailable "rapidocr_onnxruntime"
          Add-HiddenImportIfAvailable "paddleocr"
          Add-HiddenImportIfAvailable "easyocr"
          Add-HiddenImportIfAvailable "onnxruntime"

          python -m PyInstaller --noconfirm --onedir --windowed @iconArgs --name "VideoSubtitleRemoverPro" @dataArgs @hiddenImports VideoSubtitleRemover.py
          $hiddenImportModules |
            Sort-Object -Unique |
            ConvertTo-Json |
            Set-Content release-hidden-imports.json

          $distDir = "dist\VideoSubtitleRemoverPro"
          foreach ($doc in @("README.md", "LICENSE", "CHANGELOG.md")) {
            if (Test-Path $doc) {
              Copy-Item $doc -Destination (Join-Path $distDir $doc) -Force
            }
          }

      - name: Package release ZIP
        run: |
          Compress-Archive -Path dist\VideoSubtitleRemoverPro\* -DestinationPath VideoSubtitleRemoverPro-${{ github.event.inputs.version }}-windows.zip
        shell: pwsh

      # RM-51: NSIS installer build. The `installer/vsr.nsi` script
      # wraps the PyInstaller output into a one-click EXE with Start
      # Menu / Desktop shortcuts, an Uninstall entry, and a "Send to
      # VSR" file-extension verb (RM-58).
      - name: Install NSIS
        shell: pwsh
        run: choco install -y nsis
        continue-on-error: ${{ github.event.inputs.release_quality != 'strict' }}

      - name: Build NSIS installer
        shell: pwsh
        run: |
          if (Test-Path 'C:\Program Files (x86)\NSIS\makensis.exe') {
            & 'C:\Program Files (x86)\NSIS\makensis.exe' installer\vsr.nsi
          } elseif ("${{ github.event.inputs.release_quality }}" -eq "strict") {
            throw "Strict release requires NSIS, but makensis.exe was not found."
          } else {
            Write-Host "NSIS not found; skipping installer build."
          }
          if ("${{ github.event.inputs.release_quality }}" -eq "strict" -and -not (Test-Path 'VideoSubtitleRemoverPro-Setup.exe')) {
            throw "Strict release requires VideoSubtitleRemoverPro-Setup.exe."
          }
        continue-on-error: ${{ github.event.inputs.release_quality != 'strict' }}

      - name: Check signing readiness
        id: signing
        shell: pwsh
        env:
          AZURE_SIGN_TENANT_ID: ${{ secrets.AZURE_SIGN_TENANT_ID }}
        run: |
          $hasSigning = -not [string]::IsNullOrWhiteSpace($env:AZURE_SIGN_TENANT_ID)
          "has_signing=$($hasSigning.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      # RM-50: optional code-signing via Azure Trusted Signing. Activated
      # only when the AZURE_SIGN_TENANT_ID secret is set. Falls through
      # silently for fork builds without the cert provisioned.
      - name: Sign EXE + installer with Azure Trusted Signing
        if: ${{ steps.signing.outputs.has_signing == 'true' }}
        shell: pwsh
        env:
          AZURE_SIGN_TENANT_ID: ${{ secrets.AZURE_SIGN_TENANT_ID }}
          AZURE_SIGN_CLIENT_ID: ${{ secrets.AZURE_SIGN_CLIENT_ID }}
          AZURE_SIGN_CLIENT_SECRET: ${{ secrets.AZURE_SIGN_CLIENT_SECRET }}
          AZURE_SIGN_ENDPOINT: ${{ secrets.AZURE_SIGN_ENDPOINT }}
          AZURE_SIGN_ACCOUNT: ${{ secrets.AZURE_SIGN_ACCOUNT }}
          AZURE_SIGN_PROFILE: ${{ secrets.AZURE_SIGN_PROFILE }}
        run: |
          dotnet tool install --global AzureSignTool
          $exe = 'dist\VideoSubtitleRemoverPro\VideoSubtitleRemoverPro.exe'
          $installer = 'VideoSubtitleRemoverPro-Setup.exe'
          $targets = @($exe)
          if (Test-Path $installer) { $targets += $installer }
          foreach ($t in $targets) {
            azuresigntool sign `
              --azure-key-vault-url $env:AZURE_SIGN_ENDPOINT `
              --azure-key-vault-tenant-id $env:AZURE_SIGN_TENANT_ID `
              --azure-key-vault-client-id $env:AZURE_SIGN_CLIENT_ID `
              --azure-key-vault-client-secret $env:AZURE_SIGN_CLIENT_SECRET `
              --azure-key-vault-certificate $env:AZURE_SIGN_PROFILE `
              --description "Video Subtitle Remover Pro" `
              --description-url "https://github.com/SysAdminDoc/VideoSubtitleRemover" `
              --timestamp-rfc3161 "http://timestamp.acs.microsoft.com" `
              --timestamp-digest sha256 `
              --file-digest sha256 `
              $t
          }
        continue-on-error: ${{ github.event.inputs.release_quality != 'strict' }}

      - name: Verify release artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $versionTag = "${{ github.event.inputs.version }}"
          $quality = "${{ github.event.inputs.release_quality }}"
          $strict = $quality -eq "strict"
          $distDir = "dist\VideoSubtitleRemoverPro"
          $exe = Join-Path $distDir "VideoSubtitleRemoverPro.exe"
          $zip = "VideoSubtitleRemoverPro-$versionTag-windows.zip"
          $installer = "VideoSubtitleRemoverPro-Setup.exe"
          $verification = [ordered]@{
            version = $versionTag
            releaseQuality = $quality
            generatedAtUtc = (Get-Date).ToUniversalTime().ToString("o")
            assets = @()
            bundledDocs = @()
            dependencies = @()
            hiddenImports = @()
            versionChecks = @()
            smokeLaunch = [ordered]@{
              attempted = $false
              status = "skipped"
              reason = "Windowed GUI launch is skipped unless a reliable interactive desktop session is available."
            }
          }

          function Add-VerifiedAsset {
            param(
              [string]$Path,
              [string]$Name
            )
            if (-not (Test-Path $Path)) {
              throw "Required release artifact missing: $Path"
            }
            $item = Get-Item $Path
            $hash = Get-FileHash $Path -Algorithm SHA256
            $script:verification.assets += [ordered]@{
              name = $Name
              path = $Path
              bytes = $item.Length
              sha256 = $hash.Hash.ToLowerInvariant()
            }
          }

          Add-VerifiedAsset $zip "windows_zip"
          Add-VerifiedAsset $exe "app_exe"
          if (Test-Path $installer) {
            Add-VerifiedAsset $installer "nsis_installer"
          } elseif ($strict) {
            throw "Strict release requires NSIS installer artifact."
          }

          foreach ($doc in @("README.md", "LICENSE")) {
            $docPath = Join-Path $distDir $doc
            if (-not (Test-Path $docPath)) {
              throw "Required bundled document missing: $doc"
            }
            $verification.bundledDocs += $doc
          }

          $expectedVersion = $versionTag.TrimStart("v")
          $appSource = Get-Content "VideoSubtitleRemover.py" -Raw
          if ($appSource -notmatch 'APP_VERSION\s*=\s*"([^"]+)"') {
            throw "Could not find APP_VERSION in VideoSubtitleRemover.py"
          }
          $appVersion = $Matches[1]
          $appVersionMatches = $appVersion -eq $expectedVersion
          $verification.versionChecks += [ordered]@{
            path = "VideoSubtitleRemover.py"
            expected = $expectedVersion
            actual = $appVersion
            matched = $appVersionMatches
          }
          if (-not $appVersionMatches) {
            throw "APP_VERSION $appVersion does not match release tag $versionTag"
          }

          $docVersionChecks = @(
            @{ Path = "README.md"; Pattern = $expectedVersion },
            @{ Path = "CHANGELOG.md"; Pattern = "## [$expectedVersion]" },
            @{ Path = "ROADMAP.md"; Pattern = "v$expectedVersion" }
          )
          foreach ($check in $docVersionChecks) {
            $present = Test-Path $check.Path
            $matched = $false
            if ($present) {
              $matched = (Get-Content $check.Path -Raw).Contains($check.Pattern)
            }
            $verification.versionChecks += [ordered]@{
              path = $check.Path
              expected = $check.Pattern
              present = $present
              matched = $matched
            }
            if ($present -and -not $matched) {
              throw "$($check.Path) does not contain expected version marker $($check.Pattern)"
            }
          }

          $dependencyPayload = python -m pip list --format=json | ConvertFrom-Json
          foreach ($dep in ($dependencyPayload | Sort-Object name)) {
            $verification.dependencies += [ordered]@{
              name = $dep.name
              version = $dep.version
            }
          }

          if (-not (Test-Path "release-hidden-imports.json")) {
            throw "Hidden import manifest missing."
          }
          $verification.hiddenImports = Get-Content "release-hidden-imports.json" -Raw | ConvertFrom-Json

          $signingConfigured = "${{ steps.signing.outputs.has_signing }}" -eq "true"
          if ($signingConfigured) {
            $signedTargets = @($exe)
            if (Test-Path $installer) { $signedTargets += $installer }
            foreach ($target in $signedTargets) {
              $signature = Get-AuthenticodeSignature $target
              if ($signature.Status -ne "Valid") {
                throw "Authenticode signature is not valid for $target: $($signature.Status)"
              }
            }
          }

          $verification | ConvertTo-Json -Depth 5 | Set-Content release-verification.json

      - name: Upload release
        run: |
          $assets = @(
            'VideoSubtitleRemoverPro-${{ github.event.inputs.version }}-windows.zip',
            'release-verification.json'
          )
          if (Test-Path 'VideoSubtitleRemoverPro-Setup.exe') {
            Rename-Item 'VideoSubtitleRemoverPro-Setup.exe' "VideoSubtitleRemoverPro-${{ github.event.inputs.version }}-Setup.exe"
            $assets += "VideoSubtitleRemoverPro-${{ github.event.inputs.version }}-Setup.exe"
          }
          gh release create ${{ github.event.inputs.version }} `
            $assets `
            --title "VideoSubtitleRemoverPro ${{ github.event.inputs.version }}" `
            --notes "Automated build for ${{ github.event.inputs.version }}" `
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh

      - name: Check winget submission readiness
        id: winget
        shell: pwsh
        env:
          WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_PAT }}
        run: |
          $hasToken = -not [string]::IsNullOrWhiteSpace($env:WINGET_CREATE_GITHUB_TOKEN)
          "has_token=$($hasToken.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Submit winget manifest update
        if: ${{ steps.winget.outputs.has_token == 'true' }}
        shell: pwsh
        env:
          WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_PAT }}
        run: |
          $versionTag = "${{ github.event.inputs.version }}"
          $manifestVersion = $versionTag.TrimStart([char[]]@('v', 'V'))
          $packageId = "SysAdminDoc.VideoSubtitleRemoverPro"
          $installerName = "VideoSubtitleRemoverPro-$versionTag-Setup.exe"
          if (-not (Test-Path $installerName)) {
            Write-Host "NSIS installer was not produced; skipping winget submission."
            exit 0
          }

          $installerUrl = "https://github.com/SysAdminDoc/VideoSubtitleRemover/releases/download/$versionTag/$installerName"
          Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          .\wingetcreate.exe update $packageId `
            --urls "$installerUrl|x64|machine" `
            --version $manifestVersion `
            --release-notes-url "https://github.com/SysAdminDoc/VideoSubtitleRemover/releases/tag/$versionTag" `
            --submit `
            --token $env:WINGET_CREATE_GITHUB_TOKEN `
            --no-open
